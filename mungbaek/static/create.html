<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>멍백홈 · 유실 공고 등록</title>
<link rel="stylesheet" href="/common.css">
<style>
  .create-wrap{max-width:560px; margin:0 auto; padding:16px 18px 48px; display:grid; gap:14px}
  .intro{margin:0; font-size:13px; color:var(--ink-soft); text-align:center}
  .c-card{padding:18px 20px; display:grid; gap:14px}
  .c-card h2{margin:0; font-size:17px; font-weight:800; letter-spacing:-.02em}
  .sec-label{font-size:12px; font-weight:800; color:var(--navy); letter-spacing:.03em; margin-top:2px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .field{display:grid; gap:6px}
  .field label{font-size:12.5px; font-weight:800; color:var(--ink-soft)}
  .field .req{color:var(--important)}
  .field input,.field textarea{width:100%; border:1.5px solid var(--line); border-radius:11px;
    background:var(--surface); padding:11px 13px; font-size:14px}
  .field textarea{resize:vertical; min-height:64px}
  .mini-map{position:relative; border:1.5px solid var(--line); border-radius:12px; overflow:hidden; background:var(--map-bg)}
  .mini-map-hint{position:absolute; top:8px; left:8px; right:8px; z-index:5;
    background:color-mix(in srgb, var(--surface) 88%, transparent);
    border-radius:8px; padding:5px 10px; font-size:11.5px; font-weight:700;
    color:var(--ink-soft); text-align:center; pointer-events:none}
  .quick-spots{display:flex; gap:6px; flex-wrap:wrap}
  .submit-btn{width:100%; padding:15px; border-radius:13px;
    background:var(--navy); color:var(--on-navy); font-size:15.5px; font-weight:800}
  .submit-btn:hover{filter:brightness(1.08)}
  .submit-btn[disabled]{opacity:.6; cursor:progress}
  .form-err{font-size:12.5px; color:var(--important); font-weight:700; display:none; margin:0}
  .form-err.show{display:block}
  .warn{font-size:11.5px; color:var(--ink-faint); text-align:center; margin:0}
  @media (max-width:520px){ .grid2{grid-template-columns:1fr} }
</style>
</head>
<body>

<header class="mb">
  <a class="logo" href="/">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 21c-3.5 0-6-2-6-4.6 0-2.9 2.8-5.9 6-5.9s6 3 6 5.9c0 2.6-2.5 4.6-6 4.6Z" fill="var(--navy)"/>
      <circle cx="6.2" cy="8.6" r="2.1" fill="var(--navy)"/><circle cx="17.8" cy="8.6" r="2.1" fill="var(--navy)"/>
      <circle cx="9.4" cy="4.9" r="2" fill="var(--navy)"/><circle cx="14.6" cy="4.9" r="2" fill="var(--navy)"/>
    </svg>
    멍백홈
  </a>
  <div class="page-name"><b>유실 공고 등록</b> · 강아지를 잃어버리셨나요?</div>
  <div class="header-right"><a class="ghost-btn" href="/">지도로 돌아가기</a></div>
</header>

<div class="create-wrap">
  <p class="intro">공고를 등록하면 바로 <b>제보용 QR·링크</b>가 만들어지고, 목격 제보가 유실목격지도에 모입니다.</p>

  <div class="card c-card">
    <h2>강아지 정보</h2>
    <div class="field">
      <label for="dogName">이름 <span class="req">*</span></label>
      <input type="text" id="dogName" maxlength="20" placeholder="예: 콩이">
    </div>
    <div class="grid2">
      <div class="field"><label for="breed">견종</label><input type="text" id="breed" maxlength="30" placeholder="예: 말티즈 (흰색)"></div>
      <div class="field"><label for="age">나이</label><input type="text" id="age" maxlength="20" placeholder="예: 7살"></div>
      <div class="field"><label for="weight">체중</label><input type="text" id="weight" maxlength="20" placeholder="예: 4.2kg"></div>
      <div class="field"><label for="personality">성격</label><input type="text" id="personality" maxlength="30" placeholder="예: 겁이 많음"></div>
    </div>
    <div class="field"><label for="health">건강 / 복약 주의사항</label><input type="text" id="health" maxlength="60" placeholder="예: 심장약 복용 중"></div>
    <div class="field">
      <label for="caution">발견 시 안내 문구</label>
      <textarea id="caution" maxlength="200" placeholder="예: 겁이 많아 쫓아가면 더 도망가요. 잡으려 하지 말고 위치와 사진만 제보해주세요."></textarea>
    </div>
  </div>

  <div class="card c-card">
    <h2>유실 정보</h2>
    <div class="grid2">
      <div class="field"><label for="lostAt">잃어버린 시각</label><input type="datetime-local" id="lostAt"></div>
      <div class="field"><label for="lostPlace">잃어버린 장소 설명</label><input type="text" id="lostPlace" maxlength="80" placeholder="예: 노원구 중계근린공원 입구"></div>
    </div>
    <div class="field">
      <span class="sec-label">마지막으로 본 위치를 지도에 찍어주세요 <span class="req">*</span></span>
      <div class="mini-map">
        <div id="miniMapContainer"></div>
        <div class="mini-map-hint" id="miniHint">지도를 탭하면 유실 위치가 표시돼요</div>
      </div>
      <div class="quick-spots" id="quickSpots">
        <button class="chip" type="button" data-spot="352,196,중계근린공원 입구">공원 입구</button>
        <button class="chip" type="button" data-spot="222,150,중계동 주택가">주택가</button>
        <button class="chip" type="button" data-spot="622,352,당현천 산책로">당현천</button>
      </div>
    </div>
    <p class="form-err" id="formErr">이름과 유실 위치는 필수예요.</p>
    <button class="submit-btn" id="submit" type="button">공고 등록하고 QR 만들기</button>
    <p class="warn">등록하면 기존 제보 목록이 초기화되고 새 수색이 시작됩니다.</p>
  </div>
</div>

<div class="toast" id="toast" role="status"></div>

<script src="/config.js"></script>
<script src="/mapengine.js"></script>
<script>
const $=s=>document.querySelector(s);
let picked=null, engine=null;
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);}

/* 기본 시각 = 지금 */
(function(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());$("#lostAt").value=d.toISOString().slice(0,16);})();

function setLoc(x,y){
  picked={x,y}; engine&&engine.setMarker(x,y,null);
  $("#miniHint").textContent="유실 위치가 표시됐어요 — 다시 탭하면 옮길 수 있어요";
  $("#formErr").classList.remove("show");
}
MapEngine.create(document.getElementById("miniMapContainer"),
  {mode:"pick", onPick:p=>setLoc(p.x,p.y)}, eng=>{engine=eng;});

document.querySelectorAll("#quickSpots .chip").forEach(c=>{
  c.addEventListener("click",()=>{
    const [x,y,name]=c.dataset.spot.split(",");
    setLoc(+x,+y);
    if(!$("#lostPlace").value) $("#lostPlace").value=name;
    document.querySelectorAll("#quickSpots .chip").forEach(o=>o.classList.toggle("on",o===c));
  });
});

$("#submit").addEventListener("click",async()=>{
  const dogName=$("#dogName").value.trim();
  if(!dogName || !picked){
    $("#formErr").classList.add("show");
    (!dogName ? $("#dogName") : document.querySelector(".mini-map")).scrollIntoView({behavior:"smooth",block:"center"});
    return;
  }
  const btn=$("#submit"); btn.disabled=true; btn.textContent="등록 중…";
  try{
    const res=await fetch("/api/notice",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        dogName, breed:$("#breed").value.trim(), age:$("#age").value.trim(),
        weight:$("#weight").value.trim(), personality:$("#personality").value.trim(),
        health:$("#health").value.trim(), caution:$("#caution").value.trim(),
        lostAt:$("#lostAt").value.slice(0,16), lostPlace:$("#lostPlace").value.trim(),
        lostX:picked.x, lostY:picked.y, resetReports:true,
      })});
    if(!res.ok) throw new Error(await res.text());
    toast("공고가 등록됐어요! 공유 화면으로 이동합니다");
    setTimeout(()=>location.href="/share", 900);
  }catch(err){ toast("등록에 실패했어요 — 입력을 확인해주세요"); btn.disabled=false; btn.textContent="공고 등록하고 QR 만들기"; }
});
</script>
</body>
</html>
