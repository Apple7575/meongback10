# Render Blueprint — 멍백홈 유실목격지도
# Render 대시보드에서 New + → Blueprint → 이 저장소 연결 시 자동으로 아래 설정이 적용됩니다.
services:
  - type: web
    name: mungbaek-home
    runtime: python
    rootDir: mungbaek          # server.py / requirements.txt 가 있는 폴더
    region: singapore          # 한국에서 가장 빠름
    plan: free                 # 무료 (카드 불필요)
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    autoDeploy: true           # git push 하면 자동 재배포
